services:
  - type: web
    name: vyapo-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: PORT
        value: 5050
